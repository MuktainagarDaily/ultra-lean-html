name: Sync to ultra-lean-html

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Sync Code Only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Add and Fetch the Target (ultra-lean-html)
          git remote add target https://${{ secrets.SYNC_TOKEN }}@github.com/MuktainagarDaily/ultra-lean-html.git
          git fetch target main || git fetch target master
          
          # 2. Merge their code updates into our runner
          git merge target/main --allow-unrelated-histories -X ours -m "chore: sync code" || echo "No merge needed"
          
          # 3. RESET the .github folder to exactly what is on the TARGET repo
          # This protects their unique workflow files from being changed by us
          git checkout target/main -- .github || echo "No .github folder on target"
          
          # 4. Commit the restored workflows and push back to target
          git commit -m "chore: preserve target workflows" || echo "Workflows already match"
          git push target HEAD:main
