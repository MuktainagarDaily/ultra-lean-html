name: Sync to ultra-lean-html

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to ultra-lean-html
        run: |
        
          # 1. Create a temporary branch for the "clean" sync
          git checkout -b temp-sync
          
          # 2. Remove the .github folder from this temporary branch
          git rm -rf .github --cached
          # This removes it from the 'index' (the push) but doesn't delete files locally
          
          rm -rf .github
          # Now it's physically gone for this session
          
          git commit -m "sync: update code excluding workflows"
           git remote set-url origin https://${{ secrets.SYNC_TOKEN }}@github.com/MuktainagarDaily/ultra-lean-html.git
          
            # 3. Push only the current branch (usually main or master)
          
                git push origin --all
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
